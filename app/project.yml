name: HDZap
options:
  bundleIdPrefix: sh.saqoo
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.4"
  developmentLanguage: en
settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "13"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: VCFY2GFR89
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    TARGETED_DEVICE_FAMILY: "1"
targets:
  HDZap:
    type: application
    platform: iOS
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
    sources:
      - HDZap
    info:
      path: HDZap/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "Connect to the OSD bridge device via Bluetooth"
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - bluetooth-central
        CFBundleDisplayName: HDZap
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UIRequiresFullScreen: YES
        UILaunchScreen: {}
schemes:
  HDZap:
    build:
      targets:
        HDZap: all
    run:
      # Local StoreKit configuration — Xcode swaps the real App Store transactions for the
      # fake products defined in the .storekit file when this scheme is active. Doesn't
      # affect Release / TestFlight builds, which always go through real StoreKit servers.
      storeKitConfiguration: HDZap/Resources/StoreKit/HDZapPremium.storekit
