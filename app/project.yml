name: HDZap
options:
  bundleIdPrefix: sh.saqoo
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.4"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "2GN43ALZ4K"
    CODE_SIGN_STYLE: Automatic
targets:
  HDZap:
    type: application
    platform: iOS
    sources:
      - HDZap
    info:
      path: HDZap/Info.plist
      properties:
        NSBluetoothAlwaysUsageDescription: "Connect to HDZero OSD bridge device via Bluetooth"
        UIBackgroundModes:
          - bluetooth-central
        CFBundleDisplayName: HDZap
        UIRequiresFullScreen: YES
        UILaunchScreen: {}
