[env:m5stick-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
build_flags =
    -std=gnu++17
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DM5STICKS3
build_unflags = -std=gnu++11
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
lib_deps =
    m5stack/M5Unified@^0.2.7
; upload/monitor ports: leave unset for auto-detect. Override with:
;   pio run -t upload --upload-port /dev/cu.usbmodemXXXX

# Bench-only: Wi-Fi promiscuous dump on fixed channel (default ch1).
# Serial @921600 streams raw EN/MS CSV. Does not run normal HDZap (no BLE/OSD).
# Build: pio run -e m5stick-s3-espnow-analysis
# Override channel: build_flags += -DANALYSIS_WIFI_CHANNEL=6
# Only log Espressif ESP-NOW frames (tag=EN): build_flags += -DANALYSIS_ONLY_ESPNOW=1
# Verbose Serial (all tags): build_flags += -DANALYSIS_SERIAL_VERBOSE=1
# Serial is 921600 in analysis sources — use `pio device monitor -b 921600` when reading that image.
# Deeper RX queue (default in sources is 192): build_flags += -DANALYSIS_CAP_QUEUE_DEPTH=256
[env:m5stick-s3-espnow-analysis]
extends = env:m5stick-s3
build_flags =
    ${env:m5stick-s3.build_flags}
    -DANALYSIS_WIFI_CHANNEL=1
    -DANALYSIS_SERIAL_VERBOSE=0
build_src_filter =
    +<*>
    -<main.cpp>
    +<espnow_analysis_main.cpp>
