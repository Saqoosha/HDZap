name = "hdzap-premium"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Workers Free plan supports SSE streaming via the standard Response.body ReadableStream.
# No special bindings yet — we'll add KV (ENTITLEMENTS, USAGE_COUNTERS) and Apple webhook
# routes when adding JWS verification.

# Daily per-IP request counter for the /tts endpoint. Two tiers in code: bearer-only
# callers get a tight cap (preview path can't be turned into a free competitor), JWS-
# authed subscribers get a much higher cap (real race-time usage). Keys are
# `rl:<ip>:<date>`; entries TTL out after 48h so the namespace stays small.
[[kv_namespaces]]
binding = "RATELIMIT"
id = "5d72e23bb7f047a1a14dbf7a767965b5"

# Cross-user shared TTS audio cache. Keys are SHA-256 hex of
# `provider|voice|lang|rate|pitch|model|text`, so two callers asking the same provider
# for the same parameters reuse one generation across all clients globally. First caller
# pays the provider; everyone after them streams from R2 (~150 ms TTFA, $0 marginal).
[[r2_buckets]]
binding = "TTS_CACHE"
bucket_name = "hdzap-tts-cache"

[vars]
# Accept Xcode-local `.storekit` test JWS (kid: "Apple_Xcode_Key", self-signed leaf).
# These don't chain to Apple Root CA G3, so they only work for dev builds running with a
# StoreKit configuration file selected in the scheme. Real Sandbox/TestFlight/Production
# JWS still goes through the full Apple-signed path. Flip to "false" (or remove this) when
# deploying for App Store release.
ALLOW_XCODE_LOCAL_JWS = "true"

[observability]
enabled = true
