<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HDZap ユーザーマニュアル</title>
<link rel="icon" href="../favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png" />
<link rel="apple-touch-icon" href="../apple-touch-icon.png" />
<style>
  :root {
    --fg: #1f2328;
    --muted: #59636e;
    --bg: #ffffff;
    --border: #d0d7de;
    --accent: #0969da;
    --code-bg: #f6f8fa;
    --table-stripe: #f6f8fa;
    --max: 880px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #e6edf3;
      --muted: #9198a1;
      --bg: #0d1117;
      --border: #30363d;
      --accent: #4493f8;
      --code-bg: #151b23;
      --table-stripe: #151b23;
    }
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font: 16px/1.65 -apple-system, "BlinkMacSystemFont", "Helvetica Neue",
          "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
  }
  main {
    max-width: var(--max);
    margin: 0 auto;
    padding: 32px 24px 96px;
  }
  h1, h2, h3, h4, h5, h6 { line-height: 1.3; margin-top: 1.8em; scroll-margin-top: 60px; }
  h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }
  h3 { font-size: 1.2em; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code, pre {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }
  pre {
    background: var(--code-bg);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
    line-height: 1.45;
    font-size: .9em;
  }
  :not(pre) > code {
    background: var(--code-bg);
    padding: .2em .4em;
    border-radius: 4px;
    font-size: .9em;
  }
  blockquote {
    border-left: 4px solid var(--border);
    margin: 1em 0;
    padding: .5em 1em;
    color: var(--muted);
    background: var(--code-bg);
    border-radius: 0 6px 6px 0;
  }
  blockquote p:first-child { margin-top: 0; }
  blockquote p:last-child { margin-bottom: 0; }
  img { max-width: 100%; border-radius: 6px; border: 1px solid var(--border); }
  table { border-collapse: collapse; width: 100%; margin: 1em 0; }
  th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  thead th { background: var(--code-bg); }
  tbody tr:nth-child(even) { background: var(--table-stripe); }
  hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
  .mermaid { background: var(--bg); text-align: center; margin: 1em 0; padding: 1em; border: 1px solid var(--border); border-radius: 6px; }
  .toolbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: .9em;
  }
  .toolbar a { margin-left: 12px; }
  .toolbar .lang { color: var(--muted); }
  #content { opacity: 0; transition: opacity .15s ease; }
  #content.ready { opacity: 1; }
  .loading { padding: 2em; text-align: center; color: var(--muted); }
  .copy-link {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 10px 12px; margin: 12px 0;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--code-bg);
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    font-size: .95em;
  }
  .copy-link-url { flex: 1 1 200px; word-break: break-all; min-width: 0; }
  .copy-link-btn {
    flex: 0 0 auto; padding: 6px 14px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, "BlinkMacSystemFont", "Helvetica Neue",
      "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    font-size: .9em;
    cursor: pointer;
    transition: background .1s, color .1s, border-color .1s;
  }
  .copy-link-btn:hover { background: var(--code-bg); }
  .copy-link-btn:active { transform: scale(.97); }
  .copy-link-btn.copied {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
</style>
</head>
<body>
<div class="toolbar">
  <span class="lang">🇯🇵 日本語</span>
  <span><a href="../">English</a> ・ <a href="https://github.com/saqoosha/HDZap">GitHub</a></span>
</div>
<main>
  <div class="loading" id="loading">Loading…</div>
  <article id="content"></article>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  mermaid.initialize({
    startOnLoad: false,
    theme: isDark ? 'dark' : 'default',
    securityLevel: 'loose',
  });

  marked.setOptions({ gfm: true, breaks: false });

  const url = './index.md';
  try {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    const html = marked.parse(md);
    const target = document.getElementById('content');
    target.innerHTML = html;

    target.querySelectorAll('pre > code.language-mermaid').forEach(codeEl => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = codeEl.textContent;
      codeEl.parentElement.replaceWith(div);
    });

    // Generate GitHub-style anchor IDs for headings so [text](#anchor) TOC links work.
    const slugCounts = {};
    function slugify(text) {
      const base = text
        .toLowerCase()
        .replace(/[^\p{L}\p{N}\p{M}\p{Pc} -]/gu, '')
        .trim()
        .replace(/\s+/g, '-');
      const n = (slugCounts[base] || 0);
      slugCounts[base] = n + 1;
      return n === 0 ? base : `${base}-${n}`;
    }
    target.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(h => {
      if (!h.id) h.id = slugify(h.textContent);
    });

    function hashTargetId(hash) {
      if (!hash || hash === '#') return '';
      const raw = hash.slice(1);
      try {
        return decodeURIComponent(raw);
      } catch {
        return raw;
      }
    }

    function scrollToHash(hash = location.hash) {
      const id = hashTargetId(hash);
      if (!id) return false;
      const el = document.getElementById(id);
      if (!el) return false;
      el.scrollIntoView({ block: 'start' });
      return true;
    }

    target.addEventListener('click', (e) => {
      const link = e.target.closest('a[href^="#"]');
      if (link) {
        const hash = link.getAttribute('href');
        if (hash && hash !== '#' && scrollToHash(hash)) {
          e.preventDefault();
          if (location.hash !== hash) history.pushState(null, '', hash);
        }
        return;
      }

      const btn = e.target.closest('.copy-link-btn');
      if (!btn || !btn.dataset.clipboard || !navigator.clipboard) return;
      navigator.clipboard.writeText(btn.dataset.clipboard).then(() => {
        const original = btn.textContent;
        btn.textContent = btn.dataset.copiedLabel || 'Copied ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = original;
          btn.classList.remove('copied');
        }, 1500);
      }).catch(() => {});
    });

    document.getElementById('loading').remove();
    target.classList.add('ready');

    await mermaid.run({ querySelector: '.mermaid' });

    scrollToHash();
    window.addEventListener('hashchange', () => scrollToHash());
  } catch (e) {
    document.getElementById('loading').textContent =
      `Failed to load index.md: ${e.message}`;
  }
</script>
</body>
</html>
